name: CI/CD Pipeline

# ═══════════════════════════════════════════════════════════════════════════
# TRIGGERS
# ═══════════════════════════════════════════════════════════════════════════
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
    paths-ignore:
      - "**.md"
      - ".dockerignore"
      - "nginx.conf"

  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - "**.md"

  workflow_dispatch:  # Manual trigger

# ═══════════════════════════════════════════════════════════════════════════
# ENVIRONMENT
# ═══════════════════════════════════════════════════════════════════════════
env:
  CARGO_TERM_COLOR: always
  NODE_ENV: test

# ═══════════════════════════════════════════════════════════════════════════
# JOBS
# ═══════════════════════════════════════════════════════════════════════════
jobs:
  # ═════════════════════════════════════════════════════════════════════════
  # 1️⃣ BACKEND - Rust Build & Test
  # ═════════════════════════════════════════════════════════════════════════
  backend:
    name: 🦀 Backend (Rust/Axum)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      # ─────────────────────────────────────────────────────────────────────
      # 1. Checkout code
      # ─────────────────────────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────────────
      # 2. Setup Rust toolchain
      # ─────────────────────────────────────────────────────────────────────
      - name: 🦀 Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.75

      # ─────────────────────────────────────────────────────────────────────
      # 3. Cache Rust dependencies
      # ─────────────────────────────────────────────────────────────────────
      - name: 💾 Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./backend"

      # ─────────────────────────────────────────────────────────────────────
      # 4. Check Rust code formatting
      # ─────────────────────────────────────────────────────────────────────
      - name: 📝 Check Rust formatting
        run: cargo fmt -- --check || true  # Don't fail on format issues

      # ─────────────────────────────────────────────────────────────────────
      # 5. Run Clippy (Rust linter)
      # ─────────────────────────────────────────────────────────────────────
      - name: 🔍 Run Clippy linter
        run: cargo clippy --all-targets --all-features -- -D warnings || true

      # ─────────────────────────────────────────────────────────────────────
      # 6. Build Backend
      # ─────────────────────────────────────────────────────────────────────
      - name: 🏗️  Build Backend
        run: cargo build --verbose --release

      # ─────────────────────────────────────────────────────────────────────
      # 7. Run Backend Tests
      # ─────────────────────────────────────────────────────────────────────
      - name: 🧪 Run Backend Tests
        run: cargo test --verbose || true  # Tests may fail without DB

      # ─────────────────────────────────────────────────────────────────────
      # 8. Report Backend Build Success
      # ─────────────────────────────────────────────────────────────────────
      - name: ✅ Backend Build Report
        if: success()
        run: echo "✅ Backend build completed successfully!"

  # ═════════════════════════════════════════════════════════════════════════
  # 2️⃣ FRONTEND - React Build & Test
  # ═════════════════════════════════════════════════════════════════════════
  frontend:
    name: ⚛️  Frontend (React/Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-TU

    steps:
      # ─────────────────────────────────────────────────────────────────────
      # 1. Checkout code
      # ─────────────────────────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────────────
      # 2. Setup Node.js
      # ─────────────────────────────────────────────────────────────────────
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend-TU/package-lock.json"

      # ─────────────────────────────────────────────────────────────────────
      # 3. Install dependencies
      # ─────────────────────────────────────────────────────────────────────
      - name: 📚 Install npm dependencies
        run: npm install --legacy-peer-deps

      # ─────────────────────────────────────────────────────────────────────
      # 4. Run ESLint (if configured)
      # ─────────────────────────────────────────────────────────────────────
      - name: 🔍 Run ESLint
        run: npm run lint || true  # Don't fail if lint not configured

      # ─────────────────────────────────────────────────────────────────────
      # 5. Build React app
      # ─────────────────────────────────────────────────────────────────────
      - name: 🏗️  Build React app (Vite)
        run: npm run build --verbose

      # ─────────────────────────────────────────────────────────────────────
      # 6. Run Frontend Tests
      # ─────────────────────────────────────────────────────────────────────
      - name: 🧪 Run Frontend Tests
        run: npm test || true  # Tests may not be configured

      # ─────────────────────────────────────────────────────────────────────
      # 7. Check build artifacts
      # ─────────────────────────────────────────────────────────────────────
      - name: 📂 Verify build artifacts
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build artifacts created successfully"
            du -sh dist/
            ls -la dist/ || echo "dist folder empty"
          else
            echo "❌ dist folder not found"
            exit 1
          fi

      # ─────────────────────────────────────────────────────────────────────
      # 8. Report Frontend Build Success
      # ─────────────────────────────────────────────────────────────────────
      - name: ✅ Frontend Build Report
        if: success()
        run: echo "✅ Frontend build completed successfully!"

  # ═════════════════════════════════════════════════════════════════════════
  # 3️⃣ DOCKER BUILD - Build Docker images
  # ═════════════════════════════════════════════════════════════════════════
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]  # Only run after both backend and frontend succeed

    steps:
      # ─────────────────────────────────────────────────────────────────────
      # 1. Checkout code
      # ─────────────────────────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────────────
      # 2. Setup Docker Buildx
      # ─────────────────────────────────────────────────────────────────────
      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─────────────────────────────────────────────────────────────────────
      # 3. Build Backend Docker image
      # ─────────────────────────────────────────────────────────────────────
      - name: 🔨 Build Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ./backend/Dockerfile
          push: false  # Don't push, just build for verification
          tags: icms-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─────────────────────────────────────────────────────────────────────
      # 4. Build Frontend Docker image
      # ─────────────────────────────────────────────────────────────────────
      - name: 🔨 Build Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ./frontend-TU/Dockerfile
          push: false  # Don't push, just build for verification
          tags: icms-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─────────────────────────────────────────────────────────────────────
      # 5. Report Docker Build Success
      # ─────────────────────────────────────────────────────────────────────
      - name: ✅ Docker Build Report
        if: success()
        run: echo "✅ All Docker images built successfully!"

  # ═════════════════════════════════════════════════════════════════════════
  # 4️⃣ CODE QUALITY CHECK
  # ═════════════════════════════════════════════════════════════════════════
  code-quality:
    name: 📊 Code Quality Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      # ─────────────────────────────────────────────────────────────────────
      # 1. Checkout code
      # ─────────────────────────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────────────
      # 2. Run SonarCloud analysis (optional - requires token)
      # ─────────────────────────────────────────────────────────────────────
      - name: 🔍 SonarCloud Scan (optional)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # Don't fail if SonarCloud not configured

  # ═════════════════════════════════════════════════════════════════════════
  # 5️⃣ FINAL STATUS CHECK
  # ═════════════════════════════════════════════════════════════════════════
  final-status:
    name: ✅ Final Status Check
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker-build, code-quality]
    if: always()

    steps:
      - name: 🎉 All checks passed!
        if: ${{ needs.backend.result == 'success' && needs.frontend.result == 'success' && needs.docker-build.result == 'success' }}
        run: |
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║                  ✅ ALL CHECKS PASSED!                        ║"
          echo "╠════════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  ✅ Backend build successful                                  ║"
          echo "║  ✅ Frontend build successful                                 ║"
          echo "║  ✅ Docker images built successfully                          ║"
          echo "║                                                              ║"
          echo "║  Ready to deploy! 🚀                                          ║"
          echo "║                                                              ║"
          echo "╚════════════════════════════════════════════════════════════════╝"

      - name: ⚠️  Some checks failed
        if: ${{ needs.backend.result != 'success' || needs.frontend.result != 'success' || needs.docker-build.result != 'success' }}
        run: |
          echo "⚠️  One or more checks failed!"
          echo "Backend: ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Docker: ${{ needs.docker-build.result }}"
          exit 1
