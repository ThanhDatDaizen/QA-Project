name: CI/CD Pipeline - Fullstack Build Mode

# ═══════════════════════════════════════════════════════════════════════════
# TRIGGERS
# ═══════════════════════════════════════════════════════════════════════════
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
    paths-ignore:
      - "**.md"
      - ".dockerignore"
      - "nginx.conf"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

# ═══════════════════════════════════════════════════════════════════════════
# ENVIRONMENT
# ═══════════════════════════════════════════════════════════════════════════
env:
  CARGO_TERM_COLOR: always
  NODE_ENV: test
  MONGODB_URI: mongodb://admin:admin123@localhost:27017/icms_db?authSource=admin
  JWT_SECRET: test_jwt_secret_key_for_ci_testing
  VITE_APP_ENVIRONMENT: test

# ═══════════════════════════════════════════════════════════════════════════
# JOBS
# ═══════════════════════════════════════════════════════════════════════════
jobs:
  build-and-test:
    name: 🏗️ Fullstack Build & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        options: >-
          --health-cmd "mongosh localhost:27017/test --quiet --eval 'db.adminCommand(\"ping\")'" 
          --health-interval 10s 
          --health-timeout 5s 
          --health-retries 5
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: admin123
          MONGO_INITDB_DATABASE: icms_db

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────────────
      # 1. FRONTEND BUILD (Để tạo ra thư mục dist cho Rust nhúng)
      # ─────────────────────────────────────────────────────────────────────
      - name: 📦 Setup Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend-TU/package-lock.json"

      - name: 🏗️ Build Frontend Assets
        run: |
          cd frontend-TU
          npm install --legacy-peer-deps
          npm run build
          echo "✅ Frontend build complete. Checking dist folder:"
          ls -la dist/

      # ─────────────────────────────────────────────────────────────────────
      # 2. BACKEND PREPARATION
      # ─────────────────────────────────────────────────────────────────────
      - name: 🦀 Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 💾 Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./backend"

      - name: ⏳ Wait for MongoDB
        run: |
          for i in {1..30}; do
            if nc -z localhost 27017; then
              echo "✅ MongoDB is ready!"
              exit 0
            fi
            echo "Attempt $i/30: Waiting for MongoDB..."
            sleep 1
          done
          exit 1

      # ─────────────────────────────────────────────────────────────────────
      # 3. BUILD & RUN BACKEND
      # ─────────────────────────────────────────────────────────────────────
      - name: 🏗️ Build Backend (Release)
        working-directory: ./backend
        run: |
          set -e
          echo "🔨 Building backend with embedded frontend..."
          cargo build --release
          
          BINARY="target/release/icms-backend"
          if [ -f "$BINARY" ]; then
            echo "✅ Binary built successfully!"
          else
            echo "❌ Binary not found!"
            exit 101
          fi

      - name: 🚀 Start Backend Server
        working-directory: ./backend
        run: |
          ./target/release/icms-backend > /tmp/backend.log 2>&1 &
          echo "Backend started in background."
          sleep 15

      # ─────────────────────────────────────────────────────────────────────
      # 4. HEALTH CHECK
      # ─────────────────────────────────────────────────────────────────────
      - name: ✅ Health Check API
        run: |
          for i in {1..20}; do
            RESPONSE=$(curl -s http://localhost:8080/api/health || echo "fail")
            if echo "$RESPONSE" | grep -q "OK"; then
              echo "✅ Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i/20: Waiting for API..."
            sleep 3
          done
          echo "❌ API failed to respond"
          tail -n 50 /tmp/backend.log
          exit 1

      - name: 🎉 Final Report
        run: echo "╔════════════════════════════════════════╗ ║ CI PIPELINE SUCCESSFUL! 🚀 ╚════════════════════════════════════════╝"
