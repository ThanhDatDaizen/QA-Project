# Bước 1: Build mã nguồn
FROM rust:1.75-slim as builder

# Cài đặt các thư viện hệ thống cần thiết để build
RUN apt-get update && apt-get install -y pkg-config libssl-dev && rm -rf /var/lib/apt/lists/*

WORKDIR /usr/src/app
COPY . .

# Build bản release
RUN cargo build --release

# Bước 2: Tạo image chạy (siêu nhẹ)
FROM debian:bookworm-slim

# Cài đặt OpenSSL vì các backend thường cần nó để kết nối DB/Network
RUN apt-get update && apt-get install -y ca-certificates libssl3 && rm -rf /var/lib/apt/lists/*

WORKDIR /app

# COPY file thực thi từ bước builder sang
# LƯU Ý: Thay 'qa-project-backend' bằng tên trong file Cargo.toml của Tú
COPY --from=builder /usr/src/app/target/release/qa-project-backend .

# Mở port (thường là 8080 hoặc 3000 tùy code của Tú)
EXPOSE 8080

# Chạy ứng dụng
CMD ["./qa-project-backend"]
