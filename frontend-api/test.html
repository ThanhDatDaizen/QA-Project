<!DOCTYPE html>
<html>
<head>
    <title>API Client Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        #result { background: #f5f5f5; padding: 15px; margin-top: 20px; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Intellectual Contribution System - Test</h1>
    
    <h3>Health Check</h3>
    <button onclick="testHealth()">Test Health</button>
    
    <h3>Authentication</h3>
    <input type="email" id="email" placeholder="Email" value="test@university.edu">
    <input type="password" id="password" placeholder="Password" value="password123">
    <button onclick="testLogin()">Login</button>
    <button onclick="testLogout()">Logout</button>
    
    <h3>Contributions</h3>
    <button onclick="testCreateContribution()">Create Contribution</button>
    <button onclick="testListContributions()">List Contributions</button>
    
    <h3>Dashboard</h3>
    <button onclick="testDashboard()">Get Dashboard</button>
    
    <div id="result"></div>

    <script src="api-client.js"></script>
    <script>
        const client = new IntellectualContributionAPIClient('http://localhost:8080/api/v1');

        function showResult(data, isError = false) {
            const result = document.getElementById('result');
            result.innerHTML = `<pre class="${isError ? 'error' : 'success'}">${JSON.stringify(data, null, 2)}</pre>`;
        }

        async function testHealth() {
            try {
                const result = await client.healthCheck();
                showResult(result);
            } catch (error) {
                showResult(error, true);
            }
        }

        async function testLogin() {
            try {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const result = await client.authenticatePrincipal(email, password);
                showResult(result);
            } catch (error) {
                showResult(error, true);
            }
        }

        function testLogout() {
            client.logout();
            showResult({ message: 'Logged out successfully' });
        }

        async function testCreateContribution() {
            try {
                const result = await client.createContribution({
                    originator_identifier: '00000000-0000-0000-0000-000000000000',
                    thematic_subject: 'Test Category',
                    content_payload: 'Test content',
                    anonymity_flag: false
                });
                showResult(result);
            } catch (error) {
                showResult(error, true);
            }
        }

        async function testListContributions() {
            try {
                const result = await client.listContributions();
                showResult(result);
            } catch (error) {
                showResult(error, true);
            }
        }

        async function testDashboard() {
            try {
                const result = await client.getDashboard();
                showResult(result);
            } catch (error) {
                showResult(error, true);
            }
        }
    </script>
</body>
</html>
