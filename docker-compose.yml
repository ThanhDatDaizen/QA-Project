version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: contribution_db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: contribution_backend
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017
      MONGODB_DATABASE: contribution_db
      AUTHENTICATION_SECRET_KEY: super-secret-academic-key-2024-change-me
      JWT_EXPIRY_HOURS: "24"
      SYSTEM_PORT: "8080"
      SYSTEM_ENVIRONMENT: production
      LEAK_DETECTION_ENABLED: "true"
      LEAK_THRESHOLD_PER_HOUR: "100"
      ALLOWED_ORIGINS: "http://localhost:8080,http://localhost:3000,http://localhost:5173,http://0.0.0.0:8080,http://*:8080"
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: contribution_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: contribution_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    depends_on:
      - prometheus

volumes:
  mongodb_data:
