# =====================================================
# nginx.conf - Tú bảo vệ Frontend React 🛡️
# Nginx serve SPA và proxy API tới Backend
# Tú cấu hình routing cho React Router hoạt động mượt mà
# =====================================================

# Tú set worker processes
worker_processes auto;

# Tú set error log
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Tú start event block
events {
    worker_connections 2048;
    use epoll;
}

# Tú start http block
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Tú enable gzips compression (giảm bandwith!)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # ====================================================
    # Tú cấu hình upstream cho backend API
    # ====================================================
    upstream backend_api {
        # Tú point tới backend service trong Docker Compose
        server backend:8080;
    }

    # ====================================================
    # Tú cấu hình server block cho Frontend
    # ====================================================
    server {
        listen 80;
        server_name _;
        
        # Tú set root directory cho React app (serve static files)
        root /usr/share/nginx/html;
        index index.html;

        # Tú set client max body size (cho file upload)
        client_max_body_size 10M;

        # ====================================================
        # Tú cấu hình SPA routing (React Router)
        # Mọi request phải route về index.html để React Router xử lý
        # ====================================================
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ====================================================
        # Tú cấu hình API proxy (dẫn tới Backend)
        # Frontend gọi /api sẽ forward tới backend:8080
        # ====================================================
        location /api/ {
            # Tú proxy requests tới backend service
            proxy_pass http://backend_api/;
            
            # Tú set proxy headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Tú set timeout dài cho backend operations
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Tú cache busting
            proxy_cache_bypass $http_pragma $http_authorization;
            
            # CORS headers (Tú cấu hình cho cross-origin requests)
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            
            # Tú xử lý OPTIONS request (preflight)
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # ====================================================
        # Tú serve static assets (JS, CSS, images)
        # Với cache optimization cho production
        # ====================================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options nosniff;
        }

        # ====================================================
        # Tú deny access tới hidden files (.git, .env, etc)
        # ====================================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ====================================================
        # Tú health check endpoint cho Docker
        # ====================================================
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # ====================================================
        # Tú cấu hình error pages
        # ====================================================
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
